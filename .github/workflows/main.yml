name: 张家港每日7:30天气推送

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  push_weather:
    runs-on: ubuntu-latest
    steps:
      - name: 获取张家港天气
        id: weather
        uses: lzwme/weather-tianqi@main
        with:
          city: 101190209
          key: ${{ secrets.WEATHER_KEY }}

      - name: 推送到微信
        uses: miss9u/wechat-push@v1
        with:
          appid: ${{ secrets.WX_APPID }}
          appsecret: ${{ secrets.WX_APPSECRET }}
          content: |
            早上好☀️
            今日张家港天气：${{ steps.weather.outputs.weather }}
            温度：${{ steps.weather.outputs.lowtemp }} ~ ${{ steps.weather.outputs.hightemp }}℃
            温馨提示：${{ steps.weather.outputs.tips }}
